services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: yii_app
    working_dir: /var/www/html
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      - atletisdb

  nginx:
    image: nginx:latest
    container_name: yii_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  atletisdb:
    image: mysql:8.4
    container_name: atletisdb
    restart: always
    environment:
      MYSQL_DATABASE: atletisdb
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - atletisdb_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

volumes:
  atletisdb_data:
